<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户留存计时</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(90vw, 32rem);
      padding: 2rem;
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      border-radius: 1rem;
      text-align: center;
      box-shadow: 0 1rem 3rem color-mix(in srgb, CanvasText 10%, transparent);
    }

    time {
      display: block;
      margin-top: 1rem;
      font: 700 clamp(2rem, 10vw, 4rem) / 1 monospace;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main>
    <h1>本次页面停留时间</h1>
    <p>页面切到后台时暂停，返回页面后继续累计。</p>
    <time data-retention-timer datetime="PT0S" aria-live="polite">00:00:00</time>
  </main>

  <script type="module" src="./retention_timer.mjs"></script>
</body>
</html>
